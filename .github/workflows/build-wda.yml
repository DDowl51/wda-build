name: 编译 WDA (iOS16 兼容 · Xcode 14.3.1)

# 用 GitHub 的 macOS 服务器，用 Xcode 14.3.1（和 iOS 16 同代）编译 WebDriverAgent，
# 产出「未签名」的 WebDriverAgent.ipa；下载后用 Sideloadly 按你的设备重签安装即可。
# 触发：仓库 Actions 页 → 选本工作流 → Run workflow。

on:
  workflow_dispatch: {}

jobs:
  build-wda:
    runs-on: macos-14 # Sonoma，目前在役且镜像仍带 Xcode 14.3.1（macos-13 已退役会一直 queued）

    steps:
      - name: 选择 Xcode（优先 14.x，否则用最高 15.x —— 都兼容 iOS16；避开 16+）
        # iOS16 崩溃的 XCTCommandLineToolHelper 符号是 Xcode 16 才引入的，
        # 所以 14.x / 15.x 编出来的 WDA 都能在 iOS16 上跑；macos-14 只带 15.x，够用。
        run: |
          echo "== 本 runner 可用 Xcode =="
          ls -d /Applications/Xcode*.app
          XC=$(ls -d /Applications/Xcode_14*.app 2>/dev/null | sort -V | tail -1)
          if [ -z "$XC" ]; then
            XC=$(ls -d /Applications/Xcode_15*.app 2>/dev/null | sort -V | tail -1)
          fi
          if [ -z "$XC" ]; then
            echo "::error::此 runner 没有 Xcode 14.x/15.x（上面列表为实际可用版本）"
            exit 1
          fi
          echo "选用：$XC"
          sudo xcode-select -s "$XC"
          xcodebuild -version

      - name: 拉取 WebDriverAgent 源码（锁老 tag，HEAD 已需 Xcode15 编不动）
        # v5.15.5 是最后一批能用 Xcode 14.3.1 编、且兼容 iOS16 的版本。
        # 不锁 tag 直接 clone HEAD 会因为新 WDA 依赖 Xcode15+ 的 API 而编译失败。
        run: git clone --depth 1 --branch v5.15.5 https://github.com/appium/WebDriverAgent.git wda

      - name: 编译 WebDriverAgentRunner（不签名）
        working-directory: wda
        run: |
          set -eo pipefail
          xcodebuild build-for-testing \
            -project WebDriverAgent.xcodeproj \
            -scheme WebDriverAgentRunner \
            -destination 'generic/platform=iOS' \
            -derivedDataPath ./build \
            PRODUCT_BUNDLE_IDENTIFIER=com.ddowl.WebDriverAgentRunner \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""
          # 产出的 Runner app bundle id 会是 com.ddowl.WebDriverAgentRunner.xctrunner
          # （Xcode 给 UI test runner 自动加 .xctrunner 后缀），通配符 com.ddowl.* 可覆盖。

      - name: 打包成 IPA
        working-directory: wda
        run: |
          set -e
          APP=$(find build/Build/Products -maxdepth 2 -name '*-Runner.app' | head -1)
          echo "找到 App：$APP"
          test -n "$APP"
          mkdir -p Payload
          cp -R "$APP" Payload/
          zip -qry WebDriverAgent.ipa Payload
          ls -la WebDriverAgent.ipa

      - name: 上传 IPA（在运行页 Artifacts 里下载）
        uses: actions/upload-artifact@v4
        with:
          name: WebDriverAgent-ipa
          path: wda/WebDriverAgent.ipa
          if-no-files-found: error
